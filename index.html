<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGC LOGISTICA - Gestão de Performance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .card-gradient { background: linear-gradient(135deg, #4f46e5 0%, #3730a3 100%); }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); }
        .loading-screen { position: fixed; inset: 0; background: white; z-index: 100; display: flex; align-items: center; justify-content: center; transition: opacity 0.5s; }
    </style>
</head>
<body class="text-slate-900">

    <!-- Tela de Carregamento -->
    <div id="loader" class="loading-screen">
        <div class="text-center">
            <div class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-indigo-600 border-t-transparent"></div>
            <p class="mt-4 font-bold text-slate-500 uppercase tracking-widest text-xs">ISAAC É FODA</p>
        </div>
    </div>

    <header class="bg-white border-b sticky top-0 z-40 glass shadow-sm">
        <div class="max-w-7xl mx-auto px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 card-gradient rounded-2xl flex items-center justify-center text-white shadow-xl">
                    <i data-lucide="truck"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-black tracking-tighter uppercase">SGC LOGÍSTICA</h1>
                    <p class="text-[10px] font-extrabold text-indigo-500 uppercase tracking-widest">Controle Operacional • 2026</p>
                </div>
            </div>

            <nav id="month-selector" class="flex bg-slate-100 p-1.5 rounded-2xl border shadow-inner">
                <!-- Botões via JS -->
            </nav>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-10">
        <!-- KPIs Principais -->
        <div id="kpis" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-10"></div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Coluna de Diagnóstico -->
            <div class="lg:col-span-4 space-y-8">
                <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border">
                    <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-6 flex items-center gap-2">
                        <i data-lucide="award" class="w-4 text-indigo-500"></i> Alertas de Manutenção
                    </h3>
                    <div id="rankings" class="space-y-6"></div>
                </div>

                <div id="health-container" class="bg-white p-8 rounded-[2.5rem] shadow-sm border hidden">
                    <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-6 flex items-center gap-2">
                        <i data-lucide="clock" class="w-4 text-rose-500"></i> Dias Sem Rodar (Inatividade)
                    </h3>
                    <div id="fleet-health" class="space-y-5"></div>
                </div>
            </div>

            <!-- Tabela de Ocorrências -->
            <div class="lg:col-span-8 space-y-10">
                <div class="bg-white rounded-[3rem] shadow-sm border overflow-hidden">
                    <div class="px-10 py-8 border-b bg-slate-50/50 flex justify-between items-center">
                        <div>
                            <h3 class="font-black text-slate-800 text-lg uppercase tracking-tight">Registro de Quebras</h3>
                            <p class="text-[11px] font-bold text-slate-400 uppercase">Detalhamento de incidentes mecânicos</p>
                        </div>
                        <i data-lucide="wrench" class="text-rose-500 w-6"></i>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead>
                                <tr class="text-[10px] font-black text-slate-400 uppercase tracking-widest bg-slate-50">
                                    <th class="px-10 py-5 font-bold">Data do Evento</th>
                                    <th class="px-10 py-5 font-bold">Placa</th>
                                    <th class="px-10 py-5 font-bold">Motorista Responsável</th>
                                    <th class="px-10 py-5 text-right font-bold">Ação</th>
                                </tr>
                            </thead>
                            <tbody id="incidents-body" class="divide-y divide-slate-50"></tbody>
                        </table>
                    </div>
                </div>

                <!-- Gráfico de Fluxo -->
                <div class="bg-white p-10 rounded-[3rem] border shadow-sm">
                    <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-8">Frequência de Saídas Diárias</h3>
                    <div id="chart-container" class="flex items-end gap-2 h-40 w-full pt-4"></div>
                    <div class="flex justify-between mt-6 text-[9px] font-black text-slate-300 uppercase tracking-[0.2em]">
                        <span>Início do Mês</span>
                        <span>Performance Operacional</span>
                        <span>Fim do Mês</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Banco de Dados Hardcoded
        const DOWNTIME_DATA = {
            'BWU5G46': { Jan: 9, Feb: 5 }, 'BYJ1E53': { Jan: 28, Feb: 14 }, 'CSE0H31': { Jan: 21, Feb: 28 },
            'CSQ8E46': { Jan: 11, Feb: 14 }, 'OFQ8A53': { Jan: 31, Feb: 16 }, 'DKI6I07': { Jan: 23, Feb: 10 },
            'GFA9B22': { Jan: 9, Feb: 7 }, 'GHA0I73': { Jan: 5, Feb: 8 }, 'GIR7B54': { Jan: 27, Feb: 25 },
            'PEY9J45': { Jan: 9, Feb: 11 }, 'KHJ7C50': { Jan: 15, Feb: 18 }, 'PFB1495': { Jan: 10, Feb: 26 },
            'KJC1401': { Jan: 7, Feb: 12 }, 'OYV5235': { Jan: 8, Feb: 17 }, 'KRH3G40': { Jan: 21, Feb: 7 },
            'NMJ-9A41': { Jan: 27, Feb: 12 }, 'OHE9D01': { Jan: 30, Feb: 18 }, 'KLQ4482': { Jan: 13, Feb: 22 },
        };

        const DATA_2026 = {
            Janeiro: { days: 31, events: [
                { date: '05/01/2026', started: 12, incidents: [{ plate: 'CSE0H31', driver: 'MESSIAS' }] },
                { date: '10/01/2026', started: 8, incidents: [{ plate: 'DKI6I07', driver: 'MANSUETO' }] },
                { date: '16/01/2026', started: 11, incidents: [{ plate: 'CSE031', driver: 'MESSIAS' }] },
                { date: '17/01/2026', started: 8, incidents: [{ plate: 'PFB1495', driver: 'CLOVIS' }] },
                { date: '19/01/2026', started: 9, incidents: [{ plate: 'DKI6I07', driver: 'MANSUETO' }] },
                { date: '21/01/2026', started: 11, incidents: [{ plate: 'GFA9B22', driver: 'JOAO VICTOR' }] },
                { date: '22/01/2026', started: 10, incidents: [{ plate: 'KLQ4482', driver: 'JACKSON' }] },
                { date: '23/01/2026', started: 9, incidents: [{ plate: 'GHA0I73', driver: 'ELCIDES' }] },
                { date: '27/01/2026', started: 7, incidents: [{ plate: 'KLQ4482', driver: 'JACKSON' }] },
                { date: '29/01/2026', started: 11, incidents: [{ plate: 'OHE9D01', driver: 'JOELINTON' }] }
            ]},
            Fevereiro: { days: 28, events: [
                { date: '04/02/2026', started: 12, incidents: [{ plate: 'BYJ1E53', driver: 'JACKSON' }, { plate: 'OHE9D01', driver: 'JOELITON' }] },
                { date: '06/02/2026', started: 12, incidents: [{ plate: 'GFA9B22', driver: 'JOAO VICTOR' }] },
                { date: '12/02/2026', started: 13, incidents: [{ plate: 'DKI6I07', driver: 'PLATINIS' }] },
                { date: '13/02/2026', started: 12, incidents: [{ plate: 'DKI6I07', driver: 'MANSUETO' }] },
                { date: '18/02/2026', started: 8, incidents: [{ plate: 'KLQ4482', driver: 'MESSIAS' }, { plate: 'OFQ8A53', driver: 'MATHEUS' }] },
                { date: '19/02/2026', started: 8, incidents: [{ plate: 'BWU5G46', driver: 'ELMAR' }] },
                { date: '24/02/2026', started: 8, incidents: [{ plate: 'BWU5G46', driver: 'ELMAR' }] },
                { date: '26/02/2026', started: 11, incidents: [{ plate: 'GIR7B54', driver: 'JONES' }] },
                { date: '27/02/2026', started: 12, incidents: [{ plate: 'GIR7B54', driver: 'JONES' }] }
            ]},
            Março: { days: 31, events: [
                { date: '02/03/2026', started: 9, incidents: [{ plate: 'GFA9B22', driver: 'JOAO VICTOR' }, { plate: 'KJC1401', driver: 'ROBERTO CARLOS' }] },
                { date: '03/03/2026', started: 10, incidents: [{ plate: 'BYJ1E53', driver: 'JACKSON' }] },
                { date: '05/03/2026', started: 10, incidents: [{ plate: 'BWU5G46', driver: 'EMERSON' }] },
                { date: '06/03/2026', started: 10, incidents: [{ plate: 'BYJ1E53', driver: 'JACKSON' }, { plate: 'CSQ8E46', driver: 'MARCELO' }] },
                { date: '09/03/2026', started: 8, incidents: [
                    { plate: 'CSQ8E46', driver: 'MARCELO' }, { plate: 'PEY9J45', driver: 'EMERSON' }, 
                    { plate: 'OYV5235', driver: 'ERIC' }, { plate: 'NMJ-9A41', driver: 'CLOVIS' }
                ]}
            ]}
        };

        let currentMonth = 'Março';

        function render() {
            const data = DATA_2026[currentMonth];
            const allDays = Array.from({ length: data.days }, (_, i) => {
                const day = i + 1;
                const dStr = `${day.toString().padStart(2, '0')}/${currentMonth === 'Janeiro' ? '01' : currentMonth === 'Fevereiro' ? '02' : '03'}/2026`;
                return data.events.find(e => e.date === dStr) || { date: dStr, started: 9, incidents: [] };
            });

            // Stats
            const totalStarted = allDays.reduce((a, b) => a + b.started, 0);
            const incidents = allDays.flatMap(d => d.incidents.map(i => ({...i, date: d.date})));
            const uptime = (((totalStarted - incidents.length) / totalStarted) * 100).toFixed(1);

            // Inatividade Global
            const mKey = currentMonth === 'Janeiro' ? 'Jan' : (currentMonth === 'Fevereiro' ? 'Feb' : null);
            let avgIdle = 0;
            if (mKey) {
                const totalIdle = Object.values(DOWNTIME_DATA).reduce((acc, curr) => acc + curr[mKey], 0);
                avgIdle = (totalIdle / Object.keys(DOWNTIME_DATA).length).toFixed(1);
            }

            // KPIs
            document.getElementById('kpis').innerHTML = `
                ${kpiCard('zap', 'Viagens Totais', totalStarted, 'text-blue-600', 'bg-blue-50')}
                ${kpiCard('wrench', 'Quebras Registradas', incidents.length, 'text-rose-600', 'bg-rose-50')}
                ${kpiCard('activity', 'Uptime Operacional', uptime + '%', 'text-emerald-600', 'bg-emerald-50')}
                ${kpiCard('clock', 'Média de Dias Parados', mKey ? avgIdle + ' dias' : '--', 'text-indigo-600', 'bg-indigo-50')}
            `;

            // Rankings
            const drivers = {}, plates = {};
            incidents.forEach(i => {
                drivers[i.driver] = (drivers[i.driver] || 0) + 1;
                plates[i.plate] = (plates[i.plate] || 0) + 1;
            });

            document.getElementById('rankings').innerHTML = `
                <div class="space-y-4">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Motoristas com Incidentes</p>
                    ${Object.entries(drivers).sort((a,b)=>b[1]-a[1]).map(([n,v]) => `
                        <div class="flex justify-between items-center p-4 bg-slate-50 rounded-2xl border text-[11px] font-bold uppercase tracking-tight">
                            <span>${n}</span> <span class="bg-rose-100 text-rose-600 px-3 py-1 rounded-lg">${v}x</span>
                        </div>
                    `).join('') || '<p class="text-xs italic text-slate-400 p-4">Nenhuma quebra no período.</p>'}
                </div>
                <div class="space-y-4 mt-8">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Placas Reincidentes</p>
                    ${Object.entries(plates).sort((a,b)=>b[1]-a[1]).map(([p,v]) => `
                        <div class="flex justify-between items-center p-4 bg-slate-900 text-white rounded-2xl text-[11px] font-mono font-bold">
                            <span>${p}</span> <span class="text-rose-400 border-l border-slate-700 pl-4">${v} Falhas</span>
                        </div>
                    `).join('') || '<p class="text-xs italic text-slate-400 p-4">Sem veículos críticos.</p>'}
                </div>
            `;

            // Saúde -> Agora "Dias Não Rodados"
            const healthEl = document.getElementById('health-container');
            const healthBody = document.getElementById('fleet-health');
            if (mKey) {
                healthEl.classList.remove('hidden');
                healthBody.innerHTML = Object.entries(DOWNTIME_DATA)
                    .sort((a, b) => b[1][mKey] - a[1][mKey])
                    .map(([p, d]) => {
                    const daysOff = d[mKey];
                    const totalM = data.days;
                    const barWidth = (daysOff / totalM) * 100;
                    return `<div>
                        <div class="flex justify-between text-[11px] font-bold mb-1.5 uppercase">
                            <span class="text-slate-700">${p}</span>
                            <span class="${daysOff > 15 ? 'text-rose-600' : 'text-slate-400'}">${daysOff} dias parados</span>
                        </div>
                        <div class="h-2 bg-slate-100 rounded-full overflow-hidden shadow-inner">
                            <div class="h-full ${daysOff > 15 ? 'bg-rose-500' : 'bg-slate-400'}" style="width:${barWidth}%"></div>
                        </div>
                    </div>`;
                }).slice(0, 10).join(''); // Mostrando os 10 mais parados
            } else { healthEl.classList.add('hidden'); }

            // Tabela
            document.getElementById('incidents-body').innerHTML = incidents.map(i => `
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="px-10 py-5 text-sm font-bold text-slate-500 italic">${i.date}</td>
                    <td class="px-10 py-5 font-mono text-xs font-bold text-slate-900 uppercase">
                        <span class="bg-slate-100 border px-2 py-1 rounded-lg">${i.plate}</span>
                    </td>
                    <td class="px-10 py-5 text-sm font-black uppercase text-slate-700 decoration-indigo-200 decoration-2 underline underline-offset-4">${i.driver}</td>
                    <td class="px-10 py-5 text-right"><span class="bg-rose-50 text-rose-600 text-[9px] font-black px-4 py-2 rounded-full border border-rose-100 shadow-sm uppercase">Oficina</span></td>
                </tr>
            `).join('') || '<tr><td colspan="4" class="p-16 text-center text-slate-400 font-black uppercase italic tracking-widest">Operação sem quebras registradas</td></tr>';

            // Gráfico
            document.getElementById('chart-container').innerHTML = allDays.map(d => `
                <div class="flex-1 rounded-t-xl relative group transition-all duration-300 ${d.incidents.length > 0 ? 'bg-rose-500 shadow-[0_4px_12px_rgba(244,63,94,0.3)]' : 'bg-indigo-100 hover:bg-indigo-300'}" 
                     style="height: ${d.started === 0 ? '4px' : (d.started / 15) * 100}%">
                    <div class="opacity-0 group-hover:opacity-100 absolute bottom-full left-1/2 -translate-x-1/2 bg-slate-900 text-white text-[10px] p-3 rounded-2xl mb-3 shadow-2xl transition-all pointer-events-none z-50 border border-slate-700 font-bold">
                        <p class="text-indigo-400">${d.date}</p>
                        <p>${d.started} Saídas</p>
                        ${d.incidents.length > 0 ? `<p class="text-rose-400">${d.incidents.length} Falhas</p>` : ''}
                    </div>
                </div>
            `).join('');

            lucide.createIcons();
        }

        function kpiCard(icon, label, value, color, bg) {
            return `<div class="bg-white p-7 rounded-[2.5rem] border shadow-sm flex items-center gap-5 hover:-translate-y-1 transition-all duration-300 cursor-default">
                <div class="p-4 rounded-2xl ${bg} ${color} shadow-sm"><i data-lucide="${icon}"></i></div>
                <div><p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5">${label}</p><p class="text-2xl font-black text-slate-800 tracking-tighter">${value}</p></div>
            </div>`;
        }

        function setupMonths() {
            const nav = document.getElementById('month-selector');
            nav.innerHTML = Object.keys(DATA_2026).map(m => `
                <button onclick="changeMonth('${m}')" class="month-btn px-8 py-2.5 rounded-xl text-xs font-black transition-all ${m === currentMonth ? 'bg-white shadow-lg text-indigo-600 scale-105' : 'text-slate-400 hover:text-slate-600'}" data-month="${m}">
                    ${m.toUpperCase()}
                </button>
            `).join('');
        }

        window.changeMonth = (m) => { currentMonth = m; setupMonths(); render(); };

        window.onload = () => {
            setupMonths();
            render();
            setTimeout(() => document.getElementById('loader').style.opacity = '0', 500);
            setTimeout(() => document.getElementById('loader').style.display = 'none', 1000);
        };
    </script>
</body>
</html>
