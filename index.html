<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGC Logística - Dashboard Consolidado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; }
        .card-gradient { background: linear-gradient(135deg, #4f46e5 0%, #3730a3 100%); }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); }
        .loading-screen { position: fixed; inset: 0; background: white; z-index: 100; display: flex; align-items: center; justify-content: center; transition: opacity 0.5s; }
        .sidebar-right { border-left: 1px solid #e2e8f0; }
    </style>
</head>
<body class="text-slate-900 overflow-x-hidden">

    <div id="loader" class="loading-screen">
        <div class="text-center">
            <div class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-indigo-600 border-t-transparent"></div>
            <p class="mt-4 font-bold text-slate-500 uppercase tracking-widest text-[10px]">SGC LOGÍSTICA</p>
        </div>
    </div>

    <header class="bg-white border-b sticky top-0 z-40 glass shadow-sm">
        <div class="max-w-[1600px] mx-auto px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 card-gradient rounded-2xl flex items-center justify-center text-white shadow-xl shadow-indigo-200">
                    <i data-lucide="truck"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-black tracking-tighter uppercase leading-none">SGC LOGÍSTICA</h1>
                    <p class="text-[10px] font-extrabold text-indigo-500 uppercase tracking-[0.2em] mt-1">Gestão de Performance 2026</p>
                </div>
            </div>

            <nav id="month-selector" class="flex bg-slate-100 p-1.5 rounded-2xl border shadow-inner">
                <!-- Botões Gerados via JS -->
            </nav>
        </div>
    </header>

    <main class="max-w-[1600px] mx-auto px-6 py-8">
        <!-- KPIs Principais (Saídas e Inconclusões) -->
        <div id="kpis" class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8"></div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <!-- COLUNA ESQUERDA: Dados do Mês Selecionado -->
            <div class="lg:col-span-3 space-y-6">
                <div class="bg-white p-6 rounded-[2rem] shadow-sm border">
                    <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-6 flex items-center gap-2">
                        <i data-lucide="award" class="w-4 text-indigo-500"></i> Alertas Mensais
                    </h3>
                    <div id="rankings-month" class="space-y-6"></div>
                </div>

                <div id="health-container" class="bg-white p-6 rounded-[2rem] shadow-sm border hidden">
                    <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-6 flex items-center gap-2">
                        <i data-lucide="clock" class="w-4 text-rose-500"></i> Inatividade (Dias Parados)
                    </h3>
                    <div id="fleet-health" class="space-y-4"></div>
                </div>
            </div>

            <!-- COLUNA CENTRAL: Tabela e Gráfico -->
            <div class="lg:col-span-6 space-y-6">
                <div class="bg-white rounded-[2.5rem] shadow-sm border overflow-hidden">
                    <div class="px-8 py-6 border-b bg-slate-50/50 flex justify-between items-center">
                        <h3 class="font-black text-slate-800 uppercase text-sm tracking-tight">Registro de Ocorrências</h3>
                        <span id="badge-total" class="bg-rose-500 text-white text-[10px] font-black px-3 py-1 rounded-full shadow-lg uppercase tracking-tighter">0 INCONCLUSÕES</span>
                    </div>
                    <div class="overflow-x-auto max-h-[400px] overflow-y-auto">
                        <table class="w-full text-left">
                            <thead class="sticky top-0 bg-white z-10">
                                <tr class="text-[9px] font-black text-slate-400 uppercase tracking-widest bg-slate-50/80 backdrop-blur">
                                    <th class="px-8 py-4">Data</th>
                                    <th class="px-8 py-4">Placa</th>
                                    <th class="px-8 py-4">Motorista</th>
                                    <th class="px-8 py-4 text-right">Status</th>
                                </tr>
                            </thead>
                            <tbody id="incidents-body" class="divide-y divide-slate-50"></tbody>
                        </table>
                    </div>
                </div>

                <div class="bg-white p-8 rounded-[2.5rem] border shadow-sm">
                    <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-8">Saídas Diárias da Frota</h3>
                    <div id="chart-container" class="flex items-end gap-1.5 h-32 w-full"></div>
                </div>
            </div>

            <!-- COLUNA DIREITA: RESUMO ACUMULADO -->
            <div class="lg:col-span-3">
                <div class="bg-slate-900 text-white p-8 rounded-[2.5rem] shadow-2xl sticky top-[100px]">
                    <div class="flex items-center gap-3 mb-8 border-b border-slate-700 pb-4">
                        <div class="p-2 bg-indigo-500 rounded-lg">
                            <i data-lucide="bar-chart-2" class="w-5"></i>
                        </div>
                        <div>
                            <h3 class="text-sm font-black uppercase tracking-tight">Resumo Geral 2026</h3>
                            <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Acumulado de Inconclusões</p>
                        </div>
                    </div>

                    <div id="driver-summary-total" class="space-y-4">
                        <!-- Gerado via JS -->
                    </div>

                    <div class="mt-8 pt-6 border-t border-slate-700">
                        <p class="text-[9px] text-slate-500 font-bold uppercase tracking-widest leading-relaxed">
                            <i data-lucide="info" class="inline w-3 mr-1"></i>
                            Acumulado de inconclusões de janeiro, fevereiro e março.
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const DOWNTIME_DATA = {
            'BWU5G46': { Jan: 9, Feb: 5 }, 'BYJ1E53': { Jan: 28, Feb: 14 }, 'CSE0H31': { Jan: 21, Feb: 28 },
            'CSQ8E46': { Jan: 11, Feb: 14 }, 'OFQ8A53': { Jan: 31, Feb: 16 }, 'DKI6I07': { Jan: 23, Feb: 10 },
            'GFA9B22': { Jan: 9, Feb: 7 }, 'GHA0I73': { Jan: 5, Feb: 8 }, 'GIR7B54': { Jan: 27, Feb: 25 },
            'PEY9J45': { Jan: 9, Feb: 11 }, 'KHJ7C50': { Jan: 15, Feb: 18 }, 'PFB1495': { Jan: 10, Feb: 26 },
            'KJC1401': { Jan: 7, Feb: 12 }, 'OYV5235': { Jan: 8, Feb: 17 }, 'KRH3G40': { Jan: 21, Feb: 7 },
            'NMJ-9A41': { Jan: 27, Feb: 12 }, 'OHE9D01': { Jan: 30, Feb: 18 }, 'KLQ4482': { Jan: 13, Feb: 22 },
        };

        const DATA_2026 = {
            Janeiro: { days: 31, events: [
                { date: '05/01/2026', started: 12, incidents: [{ plate: 'CSE0H31', driver: 'MESSIAS' }] },
                { date: '10/01/2026', started: 8, incidents: [{ plate: 'DKI6I07', driver: 'MANSUETO' }] },
                { date: '16/01/2026', started: 11, incidents: [{ plate: 'CSE031', driver: 'MESSIAS' }] },
                { date: '17/01/2026', started: 8, incidents: [{ plate: 'PFB1495', driver: 'CLOVIS' }] },
                { date: '19/01/2026', started: 9, incidents: [{ plate: 'DKI6I07', driver: 'MANSUETO' }] },
                { date: '21/01/2026', started: 11, incidents: [{ plate: 'GFA9B22', driver: 'JOAO VICTOR' }] },
                { date: '22/01/2026', started: 10, incidents: [{ plate: 'KLQ4482', driver: 'JACKSON' }] },
                { date: '23/01/2026', started: 9, incidents: [{ plate: 'GHA0I73', driver: 'ELCIDES' }] },
                { date: '27/01/2026', started: 7, incidents: [{ plate: 'KLQ4482', driver: 'JACKSON' }] },
                { date: '29/01/2026', started: 11, incidents: [{ plate: 'OHE9D01', driver: 'JOELINTON' }] }
            ]},
            Fevereiro: { days: 28, events: [
                { date: '04/02/2026', started: 12, incidents: [{ plate: 'BYJ1E53', driver: 'JACKSON' }, { plate: 'OHE9D01', driver: 'JOELITON' }] },
                { date: '06/02/2026', started: 12, incidents: [{ plate: 'GFA9B22', driver: 'JOAO VICTOR' }] },
                { date: '12/02/2026', started: 13, incidents: [{ plate: 'DKI6I07', driver: 'PLATINIS' }] },
                { date: '13/02/2026', started: 12, incidents: [{ plate: 'DKI6I07', driver: 'MANSUETO' }] },
                { date: '18/02/2026', started: 8, incidents: [{ plate: 'KLQ4482', driver: 'MESSIAS' }, { plate: 'OFQ8A53', driver: 'MATHEUS' }] },
                { date: '19/02/2026', started: 8, incidents: [{ plate: 'BWU5G46', driver: 'ELMAR' }] },
                { date: '24/02/2026', started: 8, incidents: [{ plate: 'BWU5G46', driver: 'ELMAR' }] },
                { date: '26/02/2026', started: 11, incidents: [{ plate: 'GIR7B54', driver: 'JONES' }] },
                { date: '27/02/2026', started: 12, incidents: [{ plate: 'GIR7B54', driver: 'JONES' }] }
            ]},
            Março: { days: 31, events: [
                { date: '02/03/2026', started: 9, incidents: [{ plate: 'GFA9B22', driver: 'JOAO VICTOR' }, { plate: 'KJC1401', driver: 'ROBERTO CARLOS' }] },
                { date: '03/03/2026', started: 10, incidents: [{ plate: 'BYJ1E53', driver: 'JACKSON' }] },
                { date: '05/03/2026', started: 10, incidents: [{ plate: 'BWU5G46', driver: 'EMERSON' }] },
                { date: '06/03/2026', started: 10, incidents: [{ plate: 'BYJ1E53', driver: 'JACKSON' }, { plate: 'CSQ8E46', driver: 'MARCELO' }] },
                { date: '09/03/2026', started: 8, incidents: [
                    { plate: 'CSQ8E46', driver: 'MARCELO' }, { plate: 'PEY9J45', driver: 'EMERSON' }, 
                    { plate: 'OYV5235', driver: 'ERIC' }, { plate: 'NMJ-9A41', driver: 'CLOVIS' }
                ]}
            ]}
        };

        let currentMonth = 'Março';

        function render() {
            const data = DATA_2026[currentMonth];
            const allDays = Array.from({ length: data.days }, (_, i) => {
                const day = i + 1;
                const dStr = `${day.toString().padStart(2, '0')}/${currentMonth === 'Janeiro' ? '01' : currentMonth === 'Fevereiro' ? '02' : '03'}/2026`;
                return data.events.find(e => e.date === dStr) || { date: dStr, started: 9, incidents: [] };
            });

            // Stats Mensais
            const totalStarted = allDays.reduce((a, b) => a + b.started, 0);
            const incidents = allDays.flatMap(d => d.incidents.map(i => ({...i, date: d.date})));
            const mKey = currentMonth === 'Janeiro' ? 'Jan' : (currentMonth === 'Fevereiro' ? 'Feb' : null);

            // KPIs (Removida Frota Parada e atualizado nome de Quebras)
            document.getElementById('kpis').innerHTML = `
                ${kpiCard('zap', 'Saídas Totais', totalStarted, 'text-blue-600', 'bg-blue-50')}
                ${kpiCard('wrench', 'Inconclusão de Rota', incidents.length, 'text-rose-600', 'bg-rose-50')}
            `;

            // Badge Tabela
            document.getElementById('badge-total').innerText = `${incidents.length} INCONCLUSÕES`;

            // Rankings Mensais (Esquerda)
            const dMonth = {}, pMonth = {};
            incidents.forEach(i => {
                dMonth[i.driver] = (dMonth[i.driver] || 0) + 1;
                pMonth[i.plate] = (pMonth[i.plate] || 0) + 1;
            });

            document.getElementById('rankings-month').innerHTML = `
                <div class="space-y-3">
                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-tighter">Inconclusões do Mês</p>
                    ${Object.entries(dMonth).sort((a,b)=>b[1]-a[1]).map(([n,v]) => `
                        <div class="flex justify-between items-center p-3 bg-slate-50 rounded-xl border text-[10px] font-bold uppercase tracking-tight">
                            <span>${n}</span> <span class="bg-rose-100 text-rose-600 px-2 rounded">${v}x</span>
                        </div>
                    `).join('') || '<p class="text-[10px] italic text-slate-400">Sem ocorrências</p>'}
                </div>
            `;

            // Acumulado Geral (Direita) - Lógica de Soma de todos os meses
            const globalDrivers = {};
            Object.values(DATA_2026).forEach(month => {
                month.events.forEach(day => {
                    day.incidents.forEach(inc => {
                        globalDrivers[inc.driver] = (globalDrivers[inc.driver] || 0) + 1;
                    });
                });
            });

            document.getElementById('driver-summary-total').innerHTML = Object.entries(globalDrivers)
                .sort((a,b) => b[1] - a[1])
                .map(([name, total]) => `
                    <div class="flex items-center justify-between p-4 bg-slate-800/50 rounded-2xl border border-slate-700 hover:border-indigo-400 transition-colors">
                        <div>
                            <p class="text-[11px] font-black uppercase text-indigo-300 tracking-tight">${name}</p>
                            <p class="text-[8px] text-slate-500 font-bold uppercase mt-1">Total acumulado</p>
                        </div>
                        <div class="flex flex-col items-center">
                            <span class="text-xl font-black ${total > 2 ? 'text-rose-500' : 'text-white'} leading-none">${total}</span>
                            <span class="text-[7px] font-bold text-slate-500 uppercase">Inconclusões</span>
                        </div>
                    </div>
                `).join('');

            // Inatividade (Esquerda Inferior)
            const healthEl = document.getElementById('health-container');
            const healthBody = document.getElementById('fleet-health');
            if (mKey) {
                healthEl.classList.remove('hidden');
                healthBody.innerHTML = Object.entries(DOWNTIME_DATA)
                    .sort((a, b) => b[1][mKey] - a[1][mKey])
                    .slice(0, 8)
                    .map(([p, d]) => {
                    const daysOff = d[mKey];
                    const barWidth = (daysOff / data.days) * 100;
                    return `<div>
                        <div class="flex justify-between text-[9px] font-black mb-1.5 uppercase text-slate-500">
                            <span>${p}</span>
                            <span>${daysOff} d</span>
                        </div>
                        <div class="h-1.5 bg-slate-100 rounded-full overflow-hidden shadow-inner">
                            <div class="h-full ${daysOff > 15 ? 'bg-rose-500' : 'bg-slate-400'}" style="width:${barWidth}%"></div>
                        </div>
                    </div>`;
                }).join('');
            } else { healthEl.classList.add('hidden'); }

            // Tabela Principal
            document.getElementById('incidents-body').innerHTML = incidents.map(i => `
                <tr class="hover:bg-slate-50 transition-colors group">
                    <td class="px-8 py-4 text-[11px] font-bold text-slate-500 italic">${i.date}</td>
                    <td class="px-8 py-4 font-mono text-[11px] font-black text-slate-900 uppercase tracking-tighter">${i.plate}</td>
                    <td class="px-8 py-4 text-[11px] font-black uppercase text-slate-800">${i.driver}</td>
                    <td class="px-8 py-4 text-right"><span class="bg-rose-50 text-rose-600 text-[8px] font-black px-3 py-1.5 rounded-full border border-rose-100 uppercase">Oficina</span></td>
                </tr>
            `).join('') || '<tr><td colspan="4" class="p-16 text-center text-slate-400 font-black uppercase italic text-xs">Sem registros</td></tr>';

            // Gráfico de Barras
            document.getElementById('chart-container').innerHTML = allDays.map(d => `
                <div class="flex-1 rounded-t-lg relative group transition-all duration-300 ${d.incidents.length > 0 ? 'bg-rose-500 shadow-lg shadow-rose-200' : 'bg-indigo-100 hover:bg-indigo-200'}" 
                     style="height: ${d.started === 0 ? '4px' : (d.started / 15) * 100}%">
                    <div class="opacity-0 group-hover:opacity-100 absolute bottom-full left-1/2 -translate-x-1/2 bg-slate-900 text-white text-[8px] p-2 rounded-xl mb-2 shadow-2xl transition-all pointer-events-none z-50 font-bold">
                        ${d.date}: ${d.started} saídas
                    </div>
                </div>
            `).join('');

            lucide.createIcons();
        }

        function kpiCard(icon, label, value, color, bg) {
            return `<div class="bg-white p-7 rounded-[2rem] border shadow-sm flex items-center gap-5 hover:-translate-y-1 transition-all duration-300 cursor-default">
                <div class="p-4 rounded-2xl ${bg} ${color} shadow-sm shadow-indigo-100"><i data-lucide="${icon}"></i></div>
                <div><p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">${label}</p><p class="text-2xl font-black text-slate-800 tracking-tighter">${value}</p></div>
            </div>`;
        }

        function setupMonths() {
            const nav = document.getElementById('month-selector');
            nav.innerHTML = Object.keys(DATA_2026).map(m => `
                <button onclick="changeMonth('${m}')" class="month-btn px-6 py-2 rounded-xl text-[10px] font-black transition-all ${m === currentMonth ? 'bg-white shadow-lg text-indigo-600 scale-105' : 'text-slate-500'}" data-month="${m}">
                    ${m.toUpperCase()}
                </button>
            `).join('');
        }

        window.changeMonth = (m) => { currentMonth = m; setupMonths(); render(); };

        window.onload = () => {
            setupMonths();
            render();
            setTimeout(() => document.getElementById('loader').style.opacity = '0', 500);
            setTimeout(() => document.getElementById('loader').style.display = 'none', 1000);
        };
    </script>
</body>
</html>
