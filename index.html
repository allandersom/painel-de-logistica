<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGC Logística - Gestão de Frota</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); }
        .card-gradient { background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const DOWNTIME_DATA = {
            'BWU5G46': { Jan: 9, Feb: 5 },
            'BYJ1E53': { Jan: 28, Feb: 14 },
            'CSE0H31': { Jan: 21, Feb: 28 },
            'CSQ8E46': { Jan: 11, Feb: 14 },
            'OFQ8A53': { Jan: 31, Feb: 16 },
            'DKI6I07': { Jan: 23, Feb: 10 },
            'GFA9B22': { Jan: 9, Feb: 7 },
            'GHA0I73': { Jan: 5, Feb: 8 },
            'GIR7B54': { Jan: 27, Feb: 25 },
            'PEY9J45': { Jan: 9, Feb: 11 },
            'KHJ7C50': { Jan: 15, Feb: 18 },
            'PFB1495': { Jan: 10, Feb: 26 },
            'KJC1401': { Jan: 7, Feb: 12 },
            'OYV5235': { Jan: 8, Feb: 17 },
            'KRH3G40': { Jan: 21, Feb: 7 },
            'NMJ-9A41': { Jan: 27, Feb: 12 },
            'OHE9D01': { Jan: 30, Feb: 18 },
            'KLQ4482': { Jan: 13, Feb: 22 },
        };

        const DATA_2026 = {
            Janeiro: {
                days: 31,
                events: [
                    { date: '05/01/2026', started: 12, incidents: [{ plate: 'CSE0H31', driver: 'MESSIAS' }] },
                    { date: '10/01/2026', started: 8, incidents: [{ plate: 'DKI6I07', driver: 'MANSUETO' }] },
                    { date: '16/01/2026', started: 11, incidents: [{ plate: 'CSE031', driver: 'MESSIAS' }] },
                    { date: '17/01/2026', started: 8, incidents: [{ plate: 'PFB1495', driver: 'CLOVIS' }] },
                    { date: '19/01/2026', started: 9, incidents: [{ plate: 'DKI6I07', driver: 'MANSUETO' }] },
                    { date: '21/01/2026', started: 11, incidents: [{ plate: 'GFA9B22', driver: 'JOAO VICTOR' }] },
                    { date: '22/01/2026', started: 10, incidents: [{ plate: 'KLQ4482', driver: 'JACKSON' }] },
                    { date: '23/01/2026', started: 9, incidents: [{ plate: 'GHA0I73', driver: 'ELCIDES' }] },
                    { date: '27/01/2026', started: 7, incidents: [{ plate: 'KLQ4482', driver: 'JACKSON' }] },
                    { date: '29/01/2026', started: 11, incidents: [{ plate: 'OHE9D01', driver: 'JOELINTON' }] },
                ].concat(Array(20).fill({started: 10, incidents: []})) // Mocking other days for chart
            },
            Fevereiro: {
                days: 28,
                events: [
                    { date: '04/02/2026', started: 12, incidents: [{ plate: 'BYJ1E53', driver: 'JACKSON' }, { plate: 'OHE9D01', driver: 'JOELITON' }] },
                    { date: '06/02/2026', started: 12, incidents: [{ plate: 'GFA9B22', driver: 'JOAO VICTOR' }] },
                    { date: '12/02/2026', started: 13, incidents: [{ plate: 'DKI6I07', driver: 'PLATINIS' }] },
                    { date: '13/02/2026', started: 12, incidents: [{ plate: 'DKI6I07', driver: 'MANSUETO' }] },
                    { date: '18/02/2026', started: 8, incidents: [{ plate: 'KLQ4482', driver: 'MESSIAS' }, { plate: 'OFQ8A53', driver: 'MATHEUS' }] },
                    { date: '19/02/2026', started: 8, incidents: [{ plate: 'BWU5G46', driver: 'ELMAR' }] },
                    { date: '24/02/2026', started: 8, incidents: [{ plate: 'BWU5G46', driver: 'ELMAR' }] },
                    { date: '26/02/2026', started: 11, incidents: [{ plate: 'GIR7B54', driver: 'JONES' }] },
                    { date: '27/02/2026', started: 12, incidents: [{ plate: 'GIR7B54', driver: 'JONES' }] },
                ].concat(Array(19).fill({started: 9, incidents: []}))
            },
            Março: {
                days: 31,
                events: [
                    { date: '01/03/2026', started: 6, incidents: [] },
                    { date: '02/03/2026', started: 9, incidents: [{ plate: 'GFA9B22', driver: 'JOAO VICTOR' }, { plate: 'KJC1401', driver: 'ROBERTO CARLOS' }] },
                    { date: '03/03/2026', started: 10, incidents: [{ plate: 'BYJ1E53', driver: 'JACKSON' }] },
                    { date: '05/03/2026', started: 10, incidents: [{ plate: 'BWU5G46', driver: 'EMERSON' }] },
                    { date: '06/03/2026', started: 10, incidents: [{ plate: 'BYJ1E53', driver: 'JACKSON' }, { plate: 'CSQ8E46', driver: 'MARCELO' }] },
                    { date: '09/03/2026', started: 8, incidents: [
                        { plate: 'CSQ8E46', driver: 'MARCELO' }, 
                        { plate: 'PEY9J45', driver: 'EMERSON' }, 
                        { plate: 'OYV5235', driver: 'ERIC' }, 
                        { plate: 'NMJ-9A41', driver: 'CLOVIS' }
                    ]},
                ]
            }
        };

        function App() {
            const [activeMonth, setActiveMonth] = useState('Março');
            const months = Object.keys(DATA_2026);

            useEffect(() => {
                lucide.createIcons();
            }, [activeMonth]);

            const stats = useMemo(() => {
                const monthData = DATA_2026[activeMonth];
                const events = monthData.events.filter(e => e.date); // Filter mock items for real list
                let totalStarted = monthData.events.reduce((acc, curr) => acc + curr.started, 0);
                let totalBreaks = 0;
                
                const driverMap = {};
                const plateMap = {};

                monthData.events.forEach(day => {
                    day.incidents.forEach(inc => {
                        totalBreaks++;
                        driverMap[inc.driver] = (driverMap[inc.driver] || 0) + 1;
                        plateMap[inc.plate] = (plateMap[inc.plate] || 0) + 1;
                    });
                });

                const uptime = totalStarted > 0 ? (((totalStarted - totalBreaks) / totalStarted) * 100).toFixed(1) : 0;
                const monthKey = activeMonth === 'Janeiro' ? 'Jan' : (activeMonth === 'Fevereiro' ? 'Feb' : null);
                
                const fleetHealth = Object.entries(DOWNTIME_DATA).map(([plate, downtime]) => {
                    const daysIdle = monthKey ? downtime[monthKey] : 0;
                    const totalDays = monthData.days;
                    const utilization = (((totalDays - daysIdle) / totalDays) * 100).toFixed(0);
                    return { plate, daysIdle, utilization: parseInt(utilization) };
                }).sort((a, b) => a.utilization - b.utilization);

                return { 
                    totalStarted, 
                    totalBreaks, 
                    uptime, 
                    driverRanking: Object.entries(driverMap).sort((a,b) => b[1] - a[1]),
                    plateRanking: Object.entries(plateMap).sort((a,b) => b[1] - a[1]),
                    events, 
                    fleetHealth 
                };
            }, [activeMonth]);

            return (
                <div className="min-h-screen pb-12">
                    {/* Header Principal */}
                    <header className="bg-white border-b border-slate-200 sticky top-0 z-50 glass">
                        <div className="max-w-7xl mx-auto px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 card-gradient rounded-xl flex items-center justify-center text-white shadow-lg shadow-indigo-200">
                                    <i data-lucide="truck"></i>
                                </div>
                                <div>
                                    <h1 className="text-xl font-extrabold text-slate-900 tracking-tight uppercase">SGC Logística</h1>
                                    <p className="text-[10px] font-bold text-slate-400 tracking-widest uppercase">Gestão de Performance 2026</p>
                                </div>
                            </div>

                            <div className="flex bg-slate-100 p-1 rounded-2xl border border-slate-200">
                                {months.map(m => (
                                    <button 
                                        key={m} 
                                        onClick={() => setActiveMonth(m)} 
                                        className={`px-6 py-2 rounded-xl text-xs font-bold transition-all ${activeMonth === m ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500 hover:text-slate-800'}`}
                                    >
                                        {m}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-6 mt-8">
                        {/* Cards de Métricas Rápidas */}
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                            <KPI icon="zap" label="Viagens Totais" value={stats.totalStarted} color="text-blue-600" bg="bg-blue-50" />
                            <KPI icon="wrench" label="Quebras Mecânicas" value={stats.totalBreaks} color="text-rose-600" bg="bg-rose-50" />
                            <KPI icon="activity" label="Uptime da Frota" value={stats.uptime + "%"} color="text-emerald-600" bg="bg-emerald-50" />
                            <KPI icon="shield-check" label="Nível de Utilização" value={activeMonth === 'Março' ? '--' : `${(stats.fleetHealth.reduce((a,b)=>a+b.utilization,0)/stats.fleetHealth.length).toFixed(1)}%`} color="text-indigo-600" bg="bg-indigo-50" />
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                            
                            {/* Coluna de Diagnóstico de Quebras */}
                            <div className="lg:col-span-4 space-y-6">
                                <div className="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-200">
                                    <h3 className="text-sm font-black text-slate-400 uppercase tracking-widest mb-6 flex items-center gap-2">
                                        <i data-lucide="user-x" className="w-4"></i> Ranking de Quebras
                                    </h3>
                                    
                                    <div className="space-y-6">
                                        <section>
                                            <p className="text-[10px] font-bold text-slate-400 mb-3 uppercase tracking-tighter">Por Motorista</p>
                                            <div className="space-y-2">
                                                {stats.driverRanking.map(([name, val]) => (
                                                    <div key={name} className="flex items-center justify-between p-3 bg-slate-50 rounded-2xl border border-slate-100">
                                                        <span className="text-xs font-bold text-slate-700 uppercase">{name}</span>
                                                        <span className={`text-[10px] font-black px-2 py-1 rounded-lg ${val > 1 ? 'bg-rose-100 text-rose-600' : 'bg-slate-200 text-slate-600'}`}>
                                                            {val} {val === 1 ? 'QUEBRA' : 'QUEBRAS'}
                                                        </span>
                                                    </div>
                                                ))}
                                            </div>
                                        </section>

                                        <section>
                                            <p className="text-[10px] font-bold text-slate-400 mb-3 uppercase tracking-tighter">Por Placa do Veículo</p>
                                            <div className="space-y-2">
                                                {stats.plateRanking.map(([plate, val]) => (
                                                    <div key={plate} className="flex items-center justify-between p-3 bg-slate-900 rounded-2xl text-white">
                                                        <span className="text-xs font-mono font-bold">{plate}</span>
                                                        <span className="text-[10px] font-black text-rose-400">{val}x</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </section>
                                    </div>
                                </div>

                                {/* Sessão de Inatividade */}
                                {activeMonth !== 'Março' && (
                                    <div className="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-200">
                                        <h3 className="text-sm font-black text-slate-400 uppercase tracking-widest mb-6 flex items-center gap-2">
                                            <i data-lucide="clock" className="w-4"></i> Inatividade (Saúde)
                                        </h3>
                                        <div className="space-y-4">
                                            {stats.fleetHealth.slice(0, 5).map(truck => (
                                                <div key={truck.plate}>
                                                    <div className="flex justify-between text-[10px] font-bold mb-1 uppercase">
                                                        <span>{truck.plate}</span>
                                                        <span className={truck.utilization < 50 ? 'text-rose-500' : 'text-slate-400'}>{truck.utilization}%</span>
                                                    </div>
                                                    <div className="h-1.5 bg-slate-100 rounded-full overflow-hidden">
                                                        <div className={`h-full rounded-full transition-all duration-1000 ${truck.utilization < 40 ? 'bg-rose-500' : 'bg-indigo-500'}`} style={{width: `${truck.utilization}%`}}></div>
                                                    </div>
                                                </div>
                                            ))}
                                            <p className="text-center text-[9px] text-slate-400 font-bold uppercase mt-2 italic">Apenas os 5 mais críticos exibidos acima</p>
                                        </div>
                                    </div>
                                )}
                            </div>

                            {/* Detalhamento de Atividade Principal */}
                            <div className="lg:col-span-8 space-y-8">
                                <div className="bg-white rounded-[2.5rem] shadow-sm border border-slate-200 overflow-hidden">
                                    <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/30">
                                        <h3 className="font-bold text-slate-800">Diário de Ocorrências: {activeMonth}</h3>
                                        <div className="text-[10px] font-black text-rose-500 bg-rose-50 px-3 py-1 rounded-full uppercase tracking-widest">
                                            {stats.totalBreaks} Falhas
                                        </div>
                                    </div>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left">
                                            <thead>
                                                <tr className="text-[10px] font-black text-slate-400 uppercase tracking-widest">
                                                    <th className="px-8 py-5">Data</th>
                                                    <th className="px-8 py-5">Placa do Camião</th>
                                                    <th className="px-8 py-5">Motorista</th>
                                                    <th className="px-8 py-5 text-right">Encaminhamento</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-50">
                                                {stats.events.flatMap(d => d.incidents.map((inc, i) => (
                                                    <tr key={i} className="hover:bg-slate-50/50 transition-colors group">
                                                        <td className="px-8 py-5 text-sm font-bold text-slate-600">{d.date}</td>
                                                        <td className="px-8 py-5">
                                                            <span className="bg-slate-100 text-slate-900 px-3 py-1.5 rounded-xl font-mono text-xs font-bold border border-slate-200">
                                                                {inc.plate}
                                                            </span>
                                                        </td>
                                                        <td className="px-8 py-5 text-sm font-bold text-slate-800 uppercase tracking-tight">{inc.driver}</td>
                                                        <td className="px-8 py-5 text-right">
                                                            <div className="inline-flex items-center gap-2 text-[10px] font-black text-rose-600 bg-rose-50 px-4 py-2 rounded-full uppercase">
                                                                <i data-lucide="alert-circle" className="w-3"></i> Oficina
                                                            </div>
                                                        </td>
                                                    </tr>
                                                )))}
                                                {stats.events.filter(e => e.incidents.length > 0).length === 0 && (
                                                    <tr><td colSpan="4" className="p-12 text-center text-slate-400 text-sm font-medium italic">Nenhuma quebra registrada neste mês.</td></tr>
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>

                                {/* Gráfico Simples de Fluxo */}
                                <div className="bg-white p-8 rounded-[2.5rem] border border-slate-200 shadow-sm">
                                    <h3 className="text-xs font-black text-slate-400 uppercase tracking-widest mb-8">Fluxo de Operação Diário</h3>
                                    <div className="flex items-end gap-1.5 h-32 w-full">
                                        {DATA_2026[activeMonth].events.map((d, i) => (
                                            <div 
                                                key={i} 
                                                className={`flex-1 rounded-t-lg transition-all relative group cursor-pointer ${d.incidents.length > 0 ? 'bg-rose-400 shadow-[0_0_15px_rgba(251,113,133,0.3)]' : 'bg-slate-200 hover:bg-indigo-300'}`}
                                                style={{ height: d.started === 0 ? '4px' : `${(d.started / 15) * 100}%` }}
                                            >
                                                <div className="opacity-0 group-hover:opacity-100 absolute bottom-full left-1/2 -translate-x-1/2 bg-slate-900 text-white text-[9px] p-2 rounded-xl z-50 whitespace-nowrap mb-2 shadow-2xl transition-opacity pointer-events-none">
                                                    {d.date || 'Sem data'}: {d.started} veículos
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        function KPI({ icon, label, value, color, bg }) {
            return (
                <div className="bg-white p-6 rounded-[2rem] border border-slate-200 shadow-sm flex items-center gap-5 hover:translate-y-[-4px] transition-all duration-300">
                    <div className={`p-4 rounded-2xl ${bg} ${color} shadow-sm`}>
                        <i data-lucide={icon}></i>
                    </div>
                    <div>
                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">{label}</p>
                        <p className={`text-2xl font-black ${color.replace('text-', 'text-slate-800')}`}>{value}</p>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
